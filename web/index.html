<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=0">
    <title>我的导航-个人专属导航页-Navitem</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/lollipop/100/navigation.png" />
    <meta name="description" content="个人导航页面，提供常用网站链接和工具集合，让您快速访问常用资源" />
    <meta name="keywords" content="导航,书签,常用网站,工具集合,个人导航,快速访问" />
    <!-- NOTE: 阻塞式脚本，在 Vue 挂载之前立即应用缓存的站点设置，消除闪烁 -->
    <script>
      (function() {
        // 第一步：同步读取 localStorage 缓存，立即应用（无网络延迟）
        try {
          var cached = localStorage.getItem('siteSettings');
          if (cached) {
            var s = JSON.parse(cached);
            if (s.site_name) document.title = s.site_name;
            if (s.favicon_url) document.querySelector('link[rel="icon"]').href = s.favicon_url;
          }
        } catch(e) {}
        // 第二步：后台异步拉取最新设置并更新缓存（不阻塞渲染）
        fetch('/api/settings').then(function(r){ return r.json(); }).then(function(data) {
          if (data.code === 200 && data.data) {
            localStorage.setItem('siteSettings', JSON.stringify(data.data));
            var s = data.data;
            if (s.site_name) document.title = s.site_name;
            if (s.favicon_url) document.querySelector('link[rel="icon"]').href = s.favicon_url;
          }
        }).catch(function(){});
      })();
    </script>
  </head>
  <body style="margin:0;padding:0;background:#222;">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
